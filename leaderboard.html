<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Live Leaderboard</title>

<style>
  body {
    background: #000;
    color: white;
    font-family: 'Inter', sans-serif;
    padding: 20px;
    max-width: 700px;
    margin: auto;
  }

  h1 {
    font-size: 1.8rem;
    margin-bottom: 1.5rem;
    font-weight: 600;
    text-align: center;
    opacity: 0.9;
  }

  .question {
    font-size: 1.3rem;
    font-weight: 400;
    margin-bottom: 1.5rem;
    text-align: center;
    opacity: 0.85;
  }

  .result-box {
    background: #141414;
    border: 1px solid #2a2a2a;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
    box-shadow: 0 0 12px rgba(255,255,255,0.05);
  }

  .label {
    display: flex;
    justify-content: space-between;
    font-size: 0.9rem;
    margin-bottom: 6px;
    opacity: 0.9;
  }

  .bar-bg {
    width: 100%;
    height: 20px;
    background: #2a2a2a;
    border-radius: 6px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.35s ease;
  }

  /* WINNER ANIMATION — EPIC VERSION */
  .winner-anim {
    text-align: center;
    margin-top: 120px;
    animation: fadeIn 1.4s ease forwards;
  }

  .winner-name {
    font-size: 3.2rem;
    font-weight: 700;
    color: white;
    opacity: 0;
    animation: softPop 1.2s ease forwards;
    text-shadow: 0 0 25px rgba(255,255,255,0.25);
  }

  .winner-emojis {
    font-size: 2.5rem;
    margin-top: 25px;
    opacity: 0;
    animation: floatUp 2s ease 0.8s forwards;
    filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
  }

  .tie-name {
    opacity: 0;
    animation: floatUp 1.4s ease forwards;
    margin-bottom: 12px;
    font-size: 2rem;
    font-weight: 600;
    text-shadow: 0 0 15px rgba(255,255,255,0.2);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.97); }
    to   { opacity: 1; transform: scale(1); }
  }

  @keyframes softPop {
    0%   { transform: scale(0.6); opacity: 0; }
    60%  { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); }
  }

  @keyframes floatUp {
    0%   { opacity: 0; transform: translateY(25px); }
    100% { opacity: 1; transform: translateY(0); }
  }
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

</head>
<body>

<h1>📊 Live výsledky</h1>
<div id="question" class="question"></div>
<div id="results"></div>

<script>
const OPT_COLORS = [
  "#f0e040", "#ff5e5e", "#5ef0b8", "#5eaaff",
  "#ff9f40", "#c65eff", "#ff5ea8", "#5effd6"
];

function getRoomCode() {
  const params = new URLSearchParams(window.location.search);
  return params.get("room")?.toUpperCase() || "";
}

async function init() {
  const roomCode = getRoomCode();
  if (!roomCode) {
    document.body.innerHTML = "<h2 style='text-align:center;'>Chybí ?room=KOD v URL</h2>";
    return;
  }

  const tempApp = firebase.initializeApp(
    { databaseURL: "https://serpovanigit-default-rtdb.europe-west1.firebasedatabase.app" },
    "temp"
  );
  const tempDb = tempApp.database();

  const metaSnap = await tempDb.ref("rooms/" + roomCode + "/meta/firebaseConfig").once("value");
  const cfg = metaSnap.val();

  await tempApp.delete();

  if (!cfg) {
    document.body.innerHTML = "<h2 style='text-align:center;'>Místnost nemá uložený Firebase config.</h2>";
    return;
  }

  firebase.initializeApp(cfg);
  const db = firebase.database();
  const roomRef = db.ref("rooms/" + roomCode);

  roomRef.child("poll").on("value", snap => {
    const poll = snap.val();
    if (!poll) return;

    if (poll.status === "ended") {
      showWinner(poll);
      return;
    }

    renderLeaderboard(poll);
  });
}

function renderLeaderboard(poll) {
  document.getElementById("question").textContent = poll.question;

  const votes = poll.votes || {};
  const total = Object.values(votes).reduce((a,b)=>a+b,0);

  const container = document.getElementById("results");
  container.innerHTML = "";

  poll.options.forEach((opt, i) => {
    const count = votes[i] || 0;
    const pct = total > 0 ? Math.round((count/total)*100) : 0;

    container.innerHTML += `
      <div class="result-box">
        <div class="label">
          <span>${opt}</span>
          <span>${count} hlasy · ${pct}%</span>
        </div>
        <div class="bar-bg">
          <div class="bar-fill" style="width:${pct}%; background:${OPT_COLORS[i % OPT_COLORS.length]}"></div>
        </div>
      </div>
    `;
  });
}

function showWinner(poll) {
  const votes = poll.votes || {};
  const options = poll.options;

  let maxVotes = Math.max(...Object.values(votes));

  let winners = Object.entries(votes)
    .filter(([i, v]) => v === maxVotes)
    .map(([i]) => options[i]);

  if (winners.length > 1) {
    document.body.innerHTML = `
      <div class="winner-anim">
        <div class="winner-name" style="font-size:2.6rem; opacity:0.9;">
          REMÍZA 🎉
        </div>
        <div class="winner-emojis" style="font-size:2rem; margin-top:10px;">✨🏆✨</div>

        <div style="margin-top:40px; font-size:1.8rem; line-height:1.8;">
          ${winners.map(w => `<div class="tie-name">${w}</div>`).join("")}
        </div>
      </div>
    `;
    return;
  }

  const winner = winners[0];

  document.body.innerHTML = `
    <div class="winner-anim">
      <div class="winner-name">${winner}</div>
      <div class="winner-emojis">🎉✨🏆</div>
    </div>
  `;
}

init();
</script>

</body>
</html>
